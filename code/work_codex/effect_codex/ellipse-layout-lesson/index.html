<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ellipse Layout Lesson</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="lesson-shell">
      <section class="lesson-board" aria-label="椭圆布局教学动画">
        <header class="lesson-header">
          <p class="eyebrow">Ellipse Arc Layout</p>
          <h1>把线性卡片变成上半椭圆布局</h1>
          <p>
            这不是手写每张卡片的位置，而是把卡片索引转换成角度，再通过椭圆公式得到坐标和旋转。
          </p>
        </header>

        <div class="visual-panel">
          <svg class="diagram" viewBox="0 0 1000 620" role="img" aria-label="椭圆布局几何示意图">
            <defs>
              <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6 Z" fill="currentColor" />
              </marker>
            </defs>

            <g class="grid-layer" aria-hidden="true">
              <path d="M80 80 H920 M80 160 H920 M80 240 H920 M80 320 H920 M80 400 H920 M80 480 H920" />
              <path d="M120 54 V542 M240 54 V542 M360 54 V542 M480 54 V542 M600 54 V542 M720 54 V542 M840 54 V542" />
            </g>

            <g class="axis-layer">
              <line class="axis-line" id="axisX" x1="500" y1="536" x2="500" y2="536" />
              <line class="axis-line" id="axisY" x1="500" y1="536" x2="500" y2="536" />
              <text class="axis-label label-rx" x="635" y="556">rx</text>
              <text class="axis-label label-ry" x="510" y="385">ry</text>
            </g>

            <ellipse class="ellipse-shadow" cx="500" cy="536" rx="380" ry="360" />
            <ellipse class="ellipse-path" id="ellipsePath" cx="500" cy="536" rx="380" ry="360" />
            <path class="arc-path" id="arcPath" d="" />

            <g class="angle-layer">
              <path class="angle-sector" id="angleSector" d="" />
              <path class="angle-arc" id="angleArc" d="" />
              <text class="angle-label" id="angleLabel" x="430" y="470">angle = 270°</text>
            </g>

            <g class="projection-layer">
              <line class="projection-line" id="projectionX" x1="500" y1="176" x2="500" y2="536" />
              <line class="projection-line" id="projectionY" x1="500" y1="176" x2="500" y2="176" />
              <text class="formula-tag tag-x" id="tagX" x="520" y="528">x = cx + rx * cos(a)</text>
              <text class="formula-tag tag-y" id="tagY" x="520" y="190">y = cy + ry * sin(a)</text>
            </g>

            <g class="slots-layer" id="slotsLayer"></g>

            <g class="point-layer">
              <line class="radius-line" id="radiusLine" x1="500" y1="536" x2="500" y2="176" />
              <line class="tangent-line" id="tangentLine" x1="390" y1="176" x2="610" y2="176" />
              <circle class="center-dot" id="centerDot" cx="500" cy="536" r="7" />
              <circle class="active-dot" id="activeDot" cx="500" cy="176" r="10" />
              <text class="center-label" x="512" y="558">cx, cy</text>
              <text class="point-label" id="pointLabel" x="520" y="155">card point</text>
            </g>
          </svg>

          <div class="floating-card" id="floatingCard">
            <span>03</span>
            <strong>Active Card</strong>
          </div>
        </div>

        <aside class="explain-panel">
          <div class="step-readout">
            <span id="stepNumber">01</span>
            <h2 id="stepTitle">先确定一个大椭圆</h2>
            <p id="stepText">
              椭圆中心点不在屏幕正中，而是在画面下方；这样只露出上半段，视觉上就是扇形卡片墙。
            </p>
          </div>

          <div class="formula-box" aria-label="当前公式">
            <code id="formulaLine">x = cx + rx * cos(angle)</code>
            <code id="formulaLine2">y = cy + ry * sin(angle)</code>
          </div>

          <div class="experiment-panel" aria-label="椭圆布局实验台">
            <div class="panel-heading">
              <span>动手实验</span>
              <p>拖动滑块，观察上半椭圆、角度、坐标和卡片数量如何变化。</p>
            </div>

            <label class="range-control">
              <span>横向半径 rx <b data-value="rx">380</b></span>
              <input type="range" min="250" max="440" step="10" value="380" data-param="rx" />
            </label>
            <label class="range-control">
              <span>纵向半径 ry <b data-value="ry">360</b></span>
              <input type="range" min="240" max="420" step="10" value="360" data-param="ry" />
            </label>
            <label class="range-control">
              <span>椭圆中心 cy <b data-value="cy">536</b></span>
              <input type="range" min="460" max="585" step="5" value="536" data-param="cy" />
            </label>
            <label class="range-control">
              <span>左侧角度 <b data-value="angleStart">210</b>°</span>
              <input type="range" min="185" max="240" step="5" value="210" data-param="angleStart" />
            </label>
            <label class="range-control">
              <span>右侧角度 <b data-value="angleEnd">330</b>°</span>
              <input type="range" min="300" max="355" step="5" value="330" data-param="angleEnd" />
            </label>
            <label class="range-control">
              <span>左右各几张 <b data-value="visibleSideCount">3</b></span>
              <input type="range" min="1" max="5" step="1" value="3" data-param="visibleSideCount" />
            </label>
            <label class="range-control">
              <span>当前 offset <b data-value="activeOffset">0</b></span>
              <input type="range" min="-3" max="3" step="1" value="0" data-param="activeOffset" />
            </label>

            <div class="preset-row">
              <button type="button" data-preset="wide">宽弧线</button>
              <button type="button" data-preset="compact">紧凑弧线</button>
              <button type="button" data-preset="reset">重置</button>
            </div>
          </div>

          <div class="live-panel" aria-label="实时计算结果">
            <div><span>angle</span><strong data-stat="angle">270°</strong></div>
            <div><span>x</span><strong data-stat="x">500</strong></div>
            <div><span>y</span><strong data-stat="y">176</strong></div>
            <div><span>rotation</span><strong data-stat="rotation">0°</strong></div>
          </div>

          <div class="offset-table" id="offsetTable" aria-label="offset 到角度映射表"></div>

          <div class="lesson-controls" aria-label="教学动画控制">
            <button type="button" data-control="play">播放</button>
            <button type="button" data-control="pause">暂停</button>
            <button type="button" data-control="restart">重播</button>
          </div>

          <div class="step-list" aria-label="步骤切换">
            <button class="is-active" type="button" data-step="0">1 椭圆</button>
            <button type="button" data-step="1">2 角度</button>
            <button type="button" data-step="2">3 坐标</button>
            <button type="button" data-step="3">4 旋转</button>
            <button type="button" data-step="4">5 多卡片</button>
          </div>
        </aside>
      </section>
    </main>

    <script src="../../../js/gsap.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
