<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural Wave Card</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="wave-card" data-wave-card>
      <div class="media-wrap">
        <img src="./img/coastline-card.svg" alt="海岸线与山体的抽象插画">
      </div>

      <div class="content-wrap">
        <p class="eyebrow">Ocean Motion</p>
        <h1>自然流动的底部波浪卡片</h1>
        <p class="summary">
          适合产品专题、旅游内容、品牌活动页中的图片文字模块。底部水波持续变化，但不会像固定曲线一样机械重复。
        </p>
        <a class="action-link" href="#" aria-label="查看波浪卡片详情">查看详情</a>
      </div>

      <canvas class="wave-canvas" data-wave-canvas aria-hidden="true"></canvas>
    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
